<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>注音聽力挑戰</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #fdf6e3; height: 100vh; margin: 0; padding-top: 20px; }
        .card { width: 90%; max-width: 400px; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        .btn-play { padding: 20px; font-size: 20px; background: #2196f3; color: white; border: none; border-radius: 15px; margin-bottom: 20px; cursor: pointer; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .btn-opt { padding: 20px; font-size: 30px; border: 2px solid #5d4037; border-radius: 15px; background: white; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <button class="btn-play" onclick="playQuestion()">🔊 聽聽看是什麼？</button>
    <div class="options" id="options"></div>
</div>

<script>
    // 這裡放入你的注音資料與對應的音檔路徑
    const questions = [
        { char: "ㄅ", audio: "ㄅ.mp3" }, 
        { char: "ㄆ", audio: "ㄆ.mp3" },
        // ...請填入你所有的符號與對應音檔
    ];

    let currentQ = 0;
    const allChars = ["ㄅ", "ㄆ", "ㄇ", "ㄈ", "ㄉ", "ㄊ", "ㄋ", "ㄌ"]; // 簡化版清單

    function playQuestion() {
        const audio = new Audio(questions[currentQ].audio);
        audio.play();
    }

    function renderOptions() {
        const optDiv = document.getElementById('options');
        optDiv.innerHTML = '';
        // 隨機選出 4 個選項
        let choices = [questions[currentQ].char];
        while(choices.length < 4) {
            let r = allChars[Math.floor(Math.random() * allChars.length)];
            if(!choices.includes(r)) choices.push(r);
        }
        choices.sort(() => Math.random() - 0.5);

        choices.forEach(c => {
            const b = document.createElement('button');
            b.className = 'btn-opt';
            b.textContent = c;
            b.onclick = () => check(c);
            optDiv.appendChild(b);
        });
    }

    function check(val) {
        if(val === questions[currentQ].char) {
            confetti();
            new Audio('good.mp3').play(); // 播放你的「太棒了」錄音檔
            setTimeout(() => { currentQ++; renderOptions(); }, 1500);
        } else {
            alert("再聽一次喔！");
        }
    }

    renderOptions();
</script>
</body>
</html>
