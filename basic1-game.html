<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>注音聽力練習</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #fdf6e3; height: 100vh; margin: 0; padding-top: 20px; }
        .card { width: 90%; max-width: 400px; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        .btn-main { padding: 20px; font-size: 24px; background: #2e7d32; color: white; border: none; border-radius: 15px; cursor: pointer; width: 100%; margin-bottom: 10px; }
        .btn-audio { background: #2196f3; }
        /* 新增：教學影片按鈕樣式 */
        .btn-video { background: #d32f2f; } 
        .target-hint { font-size: 80px; font-weight: bold; color: #d84315; height: 100px; margin: 10px; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .btn-opt { padding: 20px; font-size: 35px; border: 2px solid #5d4037; border-radius: 15px; background: white; cursor: pointer; }
    </style>
</head>
<body>

<div class="card" id="start-screen">
    <h1>注音聽力練習</h1>
    <button class="btn-main" onclick="startApp()">開始遊戲</button>
</div>

<div class="card" id="game-screen" style="display:none;">
    <div id="hint-display" class="target-hint"></div>
    <button class="btn-main btn-audio" id="listen-btn" onclick="playQuestionAudio()">🔊 再聽一次</button>
    <button class="btn-main btn-video" onclick="window.open('https://youtu.be/VIL7a43Q7eg', '_blank')">🎥 觀看教學影片</button>
    <div class="options" id="options"></div>
</div>

<script>
    const audio = new Audio('basic-1.mp3');
    const goodSound = new Audio('good.mp3'); 

    const zhuyinData = [
        {"symbol": "ㄅ", "start": 0.066, "end": 4.233}, {"symbol": "ㄆ", "start": 4.766, "end": 9.666},
        {"symbol": "ㄇ", "start": 11.200, "end": 14.833}, {"symbol": "ㄈ", "start": 15.933, "end": 19.600},
        {"symbol": "ㄉ", "start": 20.766, "end": 25.166}, {"symbol": "ㄊ", "start": 25.800, "end": 30.566},
        {"symbol": "ㄋ", "start": 31.600, "end": 35.100}, {"symbol": "ㄌ", "start": 35.966, "end": 38.966},
        {"symbol": "ㄍ", "start": 40.833, "end": 44.533}, {"symbol": "ㄎ", "start": 45.800, "end": 49.233},
        {"symbol": "ㄏ", "start": 50.266, "end": 54.900}, {"symbol": "ㄐ", "start": 55.700, "end": 59.833},
        {"symbol": "ㄑ", "start": 60.666, "end": 64.566}, {"symbol": "ㄒ", "start": 65.000, "end": 69.900},
        {"symbol": "ㄓ", "start": 70.700, "end": 75.433}, {"symbol": "ㄔ", "start": 76.200, "end": 79.766},
        {"symbol": "ㄕ", "start": 80.966, "end": 84.800}, {"symbol": "ㄖ", "start": 86.566, "end": 89.533},
        {"symbol": "ㄗ", "start": 90.466, "end": 95.333}, {"symbol": "ㄘ", "start": 96.133, "end": 99.466},
        {"symbol": "ㄙ", "start": 100.833, "end": 104.666}
    ];

    let pool = [];
    let currentQ = {};

    function startApp() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        pool = [...zhuyinData];
        goodSound.load(); 
        generateQuestion();
    }

    function playQuestionAudio() {
        audio.currentTime = currentQ.start;
        audio.play();
        setTimeout(() => { audio.pause(); }, (currentQ.end - currentQ.start) * 1000);
    }

    function generateQuestion() {
        if (pool.length === 0) pool = [...zhuyinData];
        const randomIndex = Math.floor(Math.random() * pool.length);
        currentQ = pool.splice(randomIndex, 1)[0];

        const hint = document.getElementById('hint-display');
        hint.textContent = currentQ.symbol;
        setTimeout(() => { hint.textContent = ""; }, 5000);
        
        const optDiv = document.getElementById('options');
        optDiv.innerHTML = '';
        
        let choices = [currentQ.symbol];
        while(choices.length < 4) {
            let r = zhuyinData[Math.floor(Math.random() * zhuyinData.length)].symbol;
            if(!choices.includes(r)) choices.push(r);
        }
        choices.sort(() => Math.random() - 0.5);

        choices.forEach(c => {
            const b = document.createElement('button');
            b.className = 'btn-opt';
            b.textContent = c;
            b.onclick = () => check(c);
            optDiv.appendChild(b);
        });
        
        setTimeout(playQuestionAudio, 500);
    }

    function check(val) {
        if(val === currentQ.symbol) {
            confetti({ particleCount: 150, spread: 100, origin: { y: 0.7 } });
            goodSound.currentTime = 0; 
            goodSound.play().catch(e => console.error("播放音效失敗:", e));
            setTimeout(generateQuestion, 2500);
        } else {
            alert("再聽一次喔！");
            playQuestionAudio();
        }
    }
</script>
</body>
</html>
