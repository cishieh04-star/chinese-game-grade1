<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>注音聽力練習</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #fdf6e3; height: 100vh; margin: 0; padding-top: 20px; }
        .card { width: 90%; max-width: 400px; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        .btn-main { padding: 20px; font-size: 24px; background: #2e7d32; color: white; border: none; border-radius: 15px; cursor: pointer; width: 100%; }
        .btn-audio { background: #2196f3; margin-top: 10px; }
        .target-hint { font-size: 80px; font-weight: bold; color: #d84315; height: 100px; margin: 10px; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .btn-opt { padding: 20px; font-size: 35px; border: 2px solid #5d4037; border-radius: 15px; background: white; cursor: pointer; }
    </style>
</head>
<body>

<div class="card" id="start-screen">
    <h1>注音聽力練習</h1>
    <button class="btn-main" onclick="startApp()">開始遊戲</button>
</div>

<div class="card" id="game-screen" style="display:none;">
    <div id="hint-display" class="target-hint"></div>
    <button class="btn-main btn-audio" onclick="playQuestionAudio()">🔊 再聽一次</button>
    <div class="options" id="options"></div>
</div>

<script>
    const allSymbols = ["ㄅ", "ㄆ", "ㄇ", "ㄈ", "ㄉ", "ㄊ", "ㄋ", "ㄌ"];
    let pool = [];
    let currentQ = {};

    function startApp() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        generateQuestion();
    }

    function playQuestionAudio() {
        const audio = new Audio(currentQ.symbol + ".mp3");
        audio.play();
    }

    function generateQuestion() {
        if (pool.length === 0) pool = [...allSymbols];
        const symbol = pool.splice(Math.floor(Math.random() * pool.length), 1)[0];
        currentQ = { symbol: symbol };

        const hint = document.getElementById('hint-display');
        hint.textContent = currentQ.symbol;
        setTimeout(() => { hint.textContent = ""; }, 5000);
        
        const optDiv = document.getElementById('options');
        optDiv.innerHTML = '';
        let choices = [currentQ.symbol];
        while(choices.length < 4) {
            let r = allSymbols[Math.floor(Math.random() * allSymbols.length)];
            if(!choices.includes(r)) choices.push(r);
        }
        choices.sort(() => Math.random() - 0.5);

        choices.forEach(c => {
            const b = document.createElement('button');
            b.className = 'btn-opt';
            b.textContent = c;
            b.onclick = () => check(c);
            optDiv.appendChild(b);
        });
        
        // 延遲播放，確保音檔有時間準備
        setTimeout(playQuestionAudio, 800);
    }

    function check(val) {
        if(val === currentQ.symbol) {
            confetti({ particleCount: 150, spread: 100, origin: { y: 0.7 } });
            new Audio('good.mp3').play();
            setTimeout(generateQuestion, 2500);
        } else {
            alert("再試一次喔！");
            playQuestionAudio();
        }
    }
</script>
</body>
</html>
